<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dash-page" onload="initDash()">
    
    <div id="prefScreen" class="overlay">
        <h2>SET YOUR PREFERENCES</h2>
        <div class="pref-grid">
            <button onclick="selectRole('Department')">DEPARTMENT</button>
            <button onclick="selectRole('Business')">BUSINESSES</button>
            <button onclick="selectRole('RP')">RP SERVER</button>
            <button onclick="selectRole('Other')">OTHER</button>
        </div>
    </div>

    <div id="mainUI" style="display: none;">
        <header>
            <span id="displayUser"></span>
            <button onclick="logout()">LOGOUT</button>
        </header>

        <div class="content-container">
            <section class="chat-box">
                <h3>COMMUNITY CHAT</h3>
                <div id="chatMessages" class="messages"></div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="Message...">
                    <button onclick="sendMsg()">SEND</button>
                </div>
            </section>

            <section id="resourceArea">
                <div id="deptTools" class="tool-tab" style="display:none;">
                    <h3>DEPARTMENT RESOURCES</h3>
                    <div class="module">CAD Terminal v4</div>
                    <div class="module">Active Patrol Zones</div>
                </div>

                <div id="bizTools" class="tool-tab" style="display:none;">
                    <h3>BUSINESS HUB</h3>
                    <div class="module">Current Commissions</div>
                    <div class="module">Business Ledger/Chat</div>
                </div>

                <div id="rpTools" class="tool-tab" style="display:none;">
                    <h3>RP SERVER TOOLS</h3>
                    <div class="module">Server Rules</div>
                    <div class="module">Player Guide</div>
                </div>

                <div id="modPanel" class="mod-tool" style="display:none;">
                    <h3>SAFETY OFFICER COMMAND</h3>
                    <input type="text" id="searchUser" placeholder="Search Username...">
                    <div class="mod-btns">
                        <button class="btn-warn">WARN</button>
                        <button class="btn-suspend">SUSPEND</button>
                        <button class="btn-ban">PERMA-BAN</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        function initDash() {
            const email = localStorage.getItem('userEmail');
            if (!email) window.location.href = 'index.html';
            document.getElementById('displayUser').innerText = "Logged in: " + email;
        }

        function selectRole(role) {
            const email = localStorage.getItem('userEmail');
            document.getElementById('prefScreen').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';

            // Check for Safety Officer Domain
            if (email.endsWith('@safetyofficers.auchat')) {
                document.getElementById('modPanel').style.display = 'block';
            }

            // Show role-specific tools
            if (role === 'Department') document.getElementById('deptTools').style.display = 'block';
            if (role === 'Business') document.getElementById('bizTools').style.display = 'block';
            if (role === 'RP') document.getElementById('rpTools').style.display = 'block';
            if (role === 'Other') alert("Please specify your role to an Admin.");
        }

        function sendMsg() {
            const email = localStorage.getItem('userEmail');
            const user = email.split('@')[0];
            const msg = document.getElementById('chatInput').value;
            const prefix = email.endsWith('@safetyofficers.auchat') ? "[MOD] " : "";
            
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML += `<p><strong>${prefix}${user}:</strong> ${msg}</p>`;
            document.getElementById('chatInput').value = "";
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
